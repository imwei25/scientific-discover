name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: 后端测试 (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: 安装依赖
        run: |
          pip install -r requirements.txt pytest
        working-directory: backend
      - name: 跑测试 (mock LLM, 不出网)
        run: python -m pytest -q
        working-directory: backend
        env:
          MOCK_LLM: "1"
      # docs/api-openapi.json 由代码生成: 改了接口忘了重新导出, 这里会红。
      - name: 校验 API 契约与代码同步
        run: |
          python export_openapi.py
          git diff --exit-code ../docs/api-openapi.json || {
            echo "::error::docs/api-openapi.json 与代码不同步——本地跑 backend/export_openapi.py 后一起提交。"
            exit 1
          }
        working-directory: backend

  frontend:
    name: 前端构建 + e2e (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 安装依赖
        run: npm ci
      - name: 类型检查 + 构建
        run: npm run build
      # dist 纳入版本管理(pull 即最新界面): 这里校验提交的 dist 确实是当前 src 构建出来的,
      # 防止改了 src 忘记 npm run build 就 push, 用户 pull 到旧界面。
      - name: 校验 dist 与 src 同步
        run: |
          git diff --exit-code -- dist || {
            echo "::error::frontend/dist 与 src 不同步——本地跑 npm run build 后把 dist 一起提交。"
            exit 1
          }
          untracked=$(git status --porcelain dist | grep '^??' || true)
          if [ -n "$untracked" ]; then
            echo "::error::构建产生了未提交的新 dist 文件:"; echo "$untracked"; exit 1
          fi
      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium
      - name: 跑 e2e
        run: npx playwright test
        env:
          CI: "1"
